version: 1.0.0+202607030729

environment:
  sdk: ^3.11.5

dependencies:
  google_sign_in: ^7.2.0
  font_awesome_flutter: ^10.7.0
  flutter_foreground_task: ^9.2.2
  flutter:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  cupertino_icons: ^1.0.8
  google_maps_flutter: ^2.10.0
  geolocator: ^14.0.2
